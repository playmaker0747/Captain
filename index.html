<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>SUA Textiles</title>

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet" href="responsive.css">

</head>

<body>

  <header class="hero">
    <div class="hero-container">
      <div class="hero-logo">
        <img src="images/logo-elegant.jpg" alt="SUA Textiles Logo" class="logo-img">
      </div>
      <div class="hero-content">
        <h1>SUA TEXTILES</h1>
        <p>Premium Shadda | Yards | Atamfa & More</p>
        <p class="tagline">Woven with Quality, Styled for Life</p>
      </div>
    </div>
    <img src="images/brand-showcase.jpg" alt="Brand Showcase" class="brand-showcase">
  </header>


  <section class="search-section">

    <input
      type="text"
      id="searchInput"
      placeholder="Search products..."
      onkeyup="renderProducts()"
    >

  </section>


  <section>

    <h2 class="section-title">
      Products
    </h2>

    <div
      id="productGrid"
      class="product-grid"
    ></div>

  </section>


  <section class="cart-section">

    <h2 class="section-title">
      Shopping Cart
    </h2>

    <div id="cartItems"></div>

    <h3 id="cartTotal">₦0</h3>

  </section>


  <section class="customer-section">

    <h2 class="section-title">
      Customer Information
    </h2>


    <input
      type="text"
      id="customerName"
      placeholder="Your Name"
    >


    <input
      type="text"
      id="customerPhone"
      placeholder="Phone Number"
    >


    <textarea
      id="customerAddress"
      placeholder="Delivery Address"
    ></textarea>


    <select id="whatsappChoice">

      <option value="">
        Whatsapp Choice
      </option>

      <option value="2348039220370">
        Line 1
      </option>

      <option value="2348147453845">
        Line 2
      </option>

      <option value="2347066465357">
        Line 3
      </option>

      <option value="2348149941988">
        Line 4
      </option>

    </select>


    <button
      onclick="sendOrder()"
      class="main-btn"
    >
      Order On WhatsApp
    </button>

  </section>

  <script src="products.js"></script>

  <script src="cart.js"></script>

  <script src="app.js"></script>

</body>
</html>
