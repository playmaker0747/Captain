<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>SUA Textiles Admin</title>

  <link rel="stylesheet" href="admin.css">

</head>

<body>

  <div class="admin-container">

    <h1>SUA TEXTILES ADMIN</h1>

    <div class="tab-buttons">
      <button class="tab-btn active" onclick="switchTab('single')">Add Single Product</button>
      <button class="tab-btn" onclick="switchTab('bulk')">Bulk Upload (CSV)</button>
    </div>

    <!-- Single Product Form -->
    <div id="single-tab" class="tab-content active">
      <div class="form-container">

        <div class="form-group">
          <label>Product Name</label>
          <input
            type="text"
            id="adminName"
            placeholder="Enter product name"
          >
        </div>

        <div class="form-group">
          <label>Price (₦)</label>
          <input
            type="number"
            id="adminPrice"
            placeholder="Enter price"
          >
        </div>

        <div class="form-group">
          <label>Product Image</label>
          <input
            type="file"
            id="adminImage"
            accept="image/*"
          >
          <div id="imagePreview" class="image-preview"></div>
        </div>

        <div class="form-group">
          <label>Stock Quantity</label>
          <input
            type="number"
            id="adminStock"
            placeholder="Enter stock quantity"
          >
        </div>

        <button onclick="addProduct()" class="btn-submit">Add Product</button>

      </div>
    </div>

    <!-- Bulk Upload Form -->
    <div id="bulk-tab" class="tab-content">
      <div class="form-container">
        <h2>Bulk Upload Products</h2>
        <p>Upload a CSV file with columns: Name, Price, Stock, ImageURL</p>
        
        <div class="upload-area" id="uploadArea">
          <div class="upload-icon">📁</div>
          <h3>Drop CSV file here or click to select</h3>
          <p>Supported format: .csv</p>
          <input type="file" id="csvFile" accept=".csv" style="display:none;">
        </div>

        <div id="preview-container" style="display:none;">
          <h3>Preview (First 10 rows)</h3>
          <table id="preview-table">
            <thead>
              <tr>
                <th>Product Name</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Image URL</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="previewBody"></tbody>
          </table>
          <button onclick="uploadBulkProducts()" class="btn-submit" id="uploadBtn">Upload All Products</button>
        </div>
      </div>
    </div>

    <div id="adminProducts"></div>

  </div>


  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>


  <script src="firebase.js"></script>

  <script src="admin.js"></script>

</body>
</html>
